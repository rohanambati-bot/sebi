<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      background: #090d16;
      color: #f3f4f6;
      font-family: 'Segoe UI', Arial, sans-serif;
      padding: 16px;
      margin: 0;
    }
    h3 { 
      font-family: Georgia, serif; 
      color: #f59e0b; 
      margin-top: 0; 
      margin-bottom: 12px;
      border-bottom: 1px solid rgba(245, 158, 11, 0.2);
      padding-bottom: 6px;
    }
    label {
      font-size: 10px;
      color: #9ca3af;
      text-transform: uppercase;
      display: block;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      background: #111827;
      border: 1px solid rgba(37, 51, 85, 0.6);
      color: white;
      padding: 8px;
      border-radius: 4px;
      box-sizing: border-box;
      margin-bottom: 12px;
      font-family: monospace;
    }
    button {
      width: 100%;
      background: linear-gradient(135deg, #d97706 0%, #f59e0b 100%);
      border: none;
      color: #090d16;
      padding: 9px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 4px;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.5px;
    }
    button:hover {
      box-shadow: 0 2px 8px rgba(245, 158, 11, 0.3);
    }
    #result { 
      margin-top: 14px; 
      font-size: 12px; 
      line-height: 1.5;
      padding: 8px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      display: none;
    }
  </style>
</head>
<body>
  <h3>Sentinel Link Checker</h3>
  <label>Sentinel Verify-Code</label>
  <input type="text" id="code" placeholder="e.g. SEBI-4F91A2">
  <button id="check">Verify Authenticity</button>
  <div id="result"></div>
  <script src="popup.js"></script>
</body>
</html>
